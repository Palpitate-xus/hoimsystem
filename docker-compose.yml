version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: hoimsystem_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hoimsystem
      POSTGRES_PASSWORD: hoimsystem_password
      POSTGRES_DB: hoimsystem
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoimsystem -d hoimsystem"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./fastapi_be
    container_name: hoimsystem_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hoimsystem:hoimsystem_password@db:5432/hoimsystem
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./fastapi_be/app/uploads:/app/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./vue3-new-ui
    container_name: hoimsystem_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
